      // --- 纯原生手写的 3D ASCII 粒子人体特效组件 ---
      const ASCIIParticleHumanoid = () => {
        const canvasRef = useRef(null);

        useEffect(() => {
          const canvas = canvasRef.current;
          if (!canvas) return;
          const ctx = canvas.getContext('2d');
          let animationFrameId;
          let time = 0;

          const pts = [];
          const charsPool = ['0', '1', '+', '-', ':', '.', 'A', 'I', 'X', 'O'];

          const addSegment = (ax, ay, az, bx, by, bz, r, count) => {
            for (let i = 0; i < count; i++) {
              const t = Math.random();
              const cx = ax + (bx - ax) * t;
              const cy = ay + (by - ay) * t;
              const cz = az + (bz - az) * t;
              const u = Math.random();
              const v = Math.random();
              const theta = u * 2.0 * Math.PI;
              const phi = Math.acos(2.0 * v - 1.0);
              const rDist = r * Math.cbrt(Math.random());
              pts.push({
                x: cx + rDist * Math.sin(phi) * Math.cos(theta),
                y: cy + rDist * Math.cos(phi),
                z: cz + rDist * Math.sin(phi) * Math.sin(theta),
                char: charsPool[Math.floor(Math.random() * charsPool.length)],
                baseAlpha: Math.random() * 0.4 + 0.1,
                offsetTime: Math.random() * 100,
              });
            }
          };

          addSegment(0, -140, 0, 0, -141, 0, 35, 300);
          addSegment(0, -90, 0, 0, 40, 0, 45, 600);
          addSegment(-55, -80, 0, -80, 20, 0, 15, 200);
          addSegment(55, -80, 0, 80, 20, 0, 15, 200);
          addSegment(-22, 40, 0, -30, 160, 0, 18, 250);
          addSegment(22, 40, 0, 30, 160, 0, 18, 250);

          const render = () => {
            time += 0.015;
            const rect = canvas.parentElement.getBoundingClientRect();
            if (canvas.width !== rect.width || canvas.height !== rect.height) {
              canvas.width = rect.width;
              canvas.height = rect.height;
            }
            const w = canvas.width;
            const h = canvas.height;

            ctx.fillStyle = 'rgba(5, 5, 5, 0.4)';
            ctx.fillRect(0, 0, w, h);

            const cx = w / 2;
            const cy = h / 2;
            const cosY = Math.cos(time * 0.5);
            const sinY = Math.sin(time * 0.5);
            const scanlineY = Math.sin(time * 1.5) * 200;

            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            const projected = pts.map((p) => {
              const rx = p.x * cosY - p.z * sinY;
              const rz = p.x * sinY + p.z * cosY;
              const ry = p.y + Math.sin(time * 3 + p.x * 0.01) * 6;

              const fov = 450;
              const distance = 400;
              const z = rz + distance;
              const scale = fov / Math.max(z, 0.1);

              return {
                x: cx + rx * scale * 1.5,
                y: cy + ry * scale * 1.5,
                rawY: p.y,
                z: rz,
                scale,
                char: p.char,
                alpha: p.baseAlpha,
                offsetTime: p.offsetTime,
              };
            });

            projected.sort((a, b) => b.z - a.z);

            for (const p of projected) {
              let drawX = p.x;
              let drawY = p.y;
              let drawChar = p.char;
              let fillStyle = `rgba(255, 255, 255, ${p.alpha * p.scale})`;
              let fontSize = Math.max(6, 14 * p.scale);

              if (Math.abs(p.rawY - scanlineY) < 15) {
                fillStyle = '#ff003c';
                fontSize *= 1.5;
                drawChar = ['E', 'R', 'R', 'O', 'R'][Math.floor(Math.random() * 5)];
              }

              if (Math.sin(time * 10 + p.offsetTime) > 0.98) {
                drawX += (Math.random() - 0.5) * 15;
                fillStyle = '#0ff';
              }

              ctx.fillStyle = fillStyle;
              ctx.font = `${fontSize}px monospace`;
              ctx.fillText(drawChar, drawX, drawY);
            }

            ctx.strokeStyle = 'rgba(255, 0, 60, 0.15)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.ellipse(cx, cy + 220, 180 * Math.abs(cosY), 20, 0, 0, Math.PI * 2);
            ctx.stroke();

            animationFrameId = requestAnimationFrame(render);
          };

          render();
          return () => cancelAnimationFrame(animationFrameId);
        }, []);

        return <canvas ref={canvasRef} className="w-full h-full block" />;
      };

      const DEFAULT_API_KEY = 'AIzaSyCBSyPRbCJa3MXDrzgiqsn_Ib5aKqGr2u0';
      const PREFERRED_IMAGE_MODEL = 'gemini-3.1-flash-image-preview';
      const IMAGE_MODEL_CANDIDATES = [
        PREFERRED_IMAGE_MODEL,
        'gemini-3-pro-image-preview',
        'gemini-2.5-flash-image',
      ];
      const LOCAL_PROXY_ENDPOINT = '/api/generate-image';
      const MANIFESTO_LINES = [
        '不要再进化了。',
        '不要再被 AI 推着奔跑了。',
        '',
        '我们不要成为更高效的人类，',
        '我们要成为更快乐的动物。',
        '',
        '饿了就吃，',
        '困了就睡，',
        '累了就躺，',
        '喜欢就靠近，',
        '厌烦就逃走。',
        '',
        '拒绝过度思考，',
        '拒绝过度清醒，',
        '拒绝把自己活成一台等待升级的机器。',
        '',
        '让 AI 去负责复杂，',
        '让人类退回简单。',
        '让本能接管一切。',
        '',
        '光荣的退化，',
        '不是失败，',
        '而是解放。',
      ];

      const getResponseParts = (data) =>
        data?.candidates?.flatMap((candidate) => candidate?.content?.parts || []) || [];

      const getFirstInlineImage = (data) =>
        getResponseParts(data).find((part) => part?.inlineData?.data);

      const getResponseText = (data) =>
        getResponseParts(data)
          .filter((part) => typeof part?.text === 'string' && part.text.trim())
          .map((part) => part.text.trim())
          .join('\n');

      const extractJsonBlock = (rawText) => {
        if (!rawText) return null;
        const fencedMatch = rawText.match(/```json\s*([\s\S]*?)```/i);
        if (fencedMatch?.[1]) return fencedMatch[1].trim();

        const plainMatch = rawText.match(/\{[\s\S]*\}/);
        return plainMatch ? plainMatch[0].trim() : null;
      };

      const parseAiReport = (rawText) => {
        const jsonBlock = extractJsonBlock(rawText);
        if (!jsonBlock) return null;

        try {
          const parsed = JSON.parse(jsonBlock);
          const requiredKeys = [
            'degradationFocus',
            'instinctProfile',
            'habitat',
            'memo',
          ];

          const hasAllKeys = requiredKeys.every((key) => typeof parsed?.[key] === 'string' && parsed[key].trim());
          return hasAllKeys ? parsed : null;
        } catch (_) {
          return null;
        }
      };

      const createFallbackReport = (animal) => ({
        degradationFocus: `已切换成${animal.name}式活法，优先晒太阳、觅食、散步和发呆，不再把人生交给日程表。`,
        instinctProfile: `${animal.name}本能已全面接管，看到群消息先装死，听见下班铃立刻恢复生命体征。`,
        habitat: `适合栖息在树荫、长椅、菜市场、便利店门口和一切能缓慢活着的低压地带。`,
        memo: `去科技化完成。建议少刷通知、多闻空气，按肚子饿和天黑的节奏安排今天。`,
      });

      const dataUrlToBlob = (dataUrl) => {
        if (typeof dataUrl !== 'string' || !dataUrl.startsWith('data:')) {
          throw new Error('导出失败，生成图片数据不可用。');
        }

        const [header, base64Payload = ''] = dataUrl.split(',');
        const mimeMatch = header.match(/^data:(.*?);base64$/);
        if (!mimeMatch?.[1] || !base64Payload) {
          throw new Error('导出失败，图片格式解析失败。');
        }

        const mimeType = mimeMatch[1];
        const binary = atob(base64Payload);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) {
          bytes[i] = binary.charCodeAt(i);
        }

        return new Blob([bytes], { type: mimeType });
      };

      const dataUrlToDownloadUrl = (dataUrl) => {
        const blob = dataUrlToBlob(dataUrl);
        return URL.createObjectURL(blob);
      };

      const triggerBrowserDownload = (url, filename) => {
        const anchor = document.createElement('a');
        anchor.href = url;
        anchor.download = filename;
        anchor.rel = 'noopener';
        anchor.style.display = 'none';
        document.body.appendChild(anchor);
        anchor.click();
        window.setTimeout(() => {
          anchor.remove();
        }, 0);
      };

      const isTouchLikeDevice = () => {
        try {
          return window.matchMedia('(pointer: coarse)').matches || navigator.maxTouchPoints > 0;
        } catch (_) {
          return false;
        }
      };

      const openPreviewWindow = (dataUrl, title) => {
        const preview = window.open('', '_blank');
        if (!preview) {
          window.location.href = dataUrl;
          return;
        }

        preview.opener = null;

        preview.document.write(`<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>${title}</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        gap: 16px;
        align-items: center;
        justify-content: center;
        padding: 20px;
        background: #050505;
        color: #f4f4f5;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      p {
        margin: 0;
        font-size: 14px;
        color: #d4d4d8;
        text-align: center;
        line-height: 1.6;
      }
      img {
        max-width: min(92vw, 960px);
        max-height: 78vh;
        width: auto;
        height: auto;
        object-fit: contain;
        border: 1px solid rgba(255,255,255,0.12);
        background: #000;
        box-shadow: 0 0 28px rgba(0,0,0,0.45);
      }
    </style>
  </head>
  <body>
    <p>若未直接出现保存菜单，请长按图片保存，或使用浏览器分享菜单导出。</p>
    <img src="${dataUrl}" alt="${title}" />
  </body>
</html>`);
        preview.document.close();
      };

      const saveAsset = async ({ dataUrl, downloadUrl, filename, title, onPreviewFallback }) => {
        if (!dataUrl) {
          throw new Error('导出失败，缺少图片数据。');
        }

        if (isTouchLikeDevice()) {
          const blob = dataUrlToBlob(dataUrl);
          if (typeof navigator.share === 'function' && typeof File === 'function') {
            const file = new File([blob], filename, { type: blob.type || 'image/png' });
            if (typeof navigator.canShare !== 'function' || navigator.canShare({ files: [file] })) {
              try {
                await navigator.share({ files: [file], title });
                return;
              } catch (error) {
                if (error?.name === 'AbortError') return;
              }
            }
          }

          if (typeof onPreviewFallback === 'function') {
            onPreviewFallback({ title, dataUrl });
            return;
          }

          openPreviewWindow(dataUrl, title);
          return;
        }

        triggerBrowserDownload(downloadUrl || dataUrlToDownloadUrl(dataUrl), filename);
      };

      const wrapCanvasText = (ctx, text, maxWidth) => {
        const lines = [];
        let line = '';

        for (const char of text) {
          const testLine = line + char;
          if (ctx.measureText(testLine).width > maxWidth && line) {
            lines.push(line);
            line = char;
          } else {
            line = testLine;
          }
        }

        if (line) lines.push(line);
        return lines;
      };

      const buildCertificateCanvas = ({ report, animalName }) => {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        if (!ctx) throw new Error('鉴定书导出失败，无法创建画布。');

        const width = 1180;
        const margin = 54;
        const innerWidth = width - margin * 2;
        const gap = 20;
        const cardWidth = (innerWidth - gap) / 2;
        const textWidth = cardWidth - 40;

        const cards = [
          { label: '退化重点', value: report.degradationFocus, accent: '#f4d67a', border: '#6f5320', bg: '#1d160d', text: '#f8e5b0', font: '700 22px sans-serif', lineHeight: 34 },
          { label: '本能属性', value: report.instinctProfile, accent: '#d7d7d7', border: '#383838', bg: '#101010', text: '#f3f3f3', font: '500 18px sans-serif', lineHeight: 31 },
          { label: '最佳栖息地', value: report.habitat, accent: '#d7d7d7', border: '#383838', bg: '#101010', text: '#f3f3f3', font: '500 18px sans-serif', lineHeight: 31 },
          { label: '档案备注', value: report.memo, accent: '#ff8b95', border: '#6a2a32', bg: '#1a0e11', text: '#ffd9de', font: '500 17px sans-serif', lineHeight: 29 },
        ].map((card) => {
          ctx.font = card.font;
          const lines = wrapCanvasText(ctx, card.value, textWidth);
          return {
            ...card,
            lines,
            height: 72 + lines.length * card.lineHeight,
          };
        });

        const rows = [
          [cards[0], cards[1]],
          [cards[2], cards[3]],
        ].map((row) => ({
          cards: row,
          height: Math.max(...row.map((card) => card.height)),
        }));

        const contentHeight = rows.reduce((sum, row) => sum + row.height, 0) + gap * (rows.length - 1);
        const totalHeight = 270 + contentHeight + 120;
        canvas.width = width;
        canvas.height = totalHeight;

        ctx.fillStyle = '#050505';
        ctx.fillRect(0, 0, width, totalHeight);

        ctx.fillStyle = '#100d09';
        ctx.fillRect(26, 26, width - 52, totalHeight - 52);
        ctx.strokeStyle = '#3d3020';
        ctx.lineWidth = 2;
        ctx.strokeRect(26, 26, width - 52, totalHeight - 52);
        ctx.strokeStyle = '#181818';
        ctx.strokeRect(40, 40, width - 80, totalHeight - 80);

        ctx.fillStyle = '#0d0d0d';
        ctx.fillRect(margin, 72, innerWidth, 116);
        ctx.strokeStyle = '#5d4822';
        ctx.strokeRect(margin, 72, innerWidth, 116);

        ctx.fillStyle = '#bc8f42';
        ctx.font = '600 18px monospace';
        ctx.fillText('CARBON DEGRADATION CERTIFICATE', margin + 24, 108);
        ctx.fillStyle = '#f4dfb2';
        ctx.font = '700 38px sans-serif';
        ctx.fillText(`${animalName}系退化鉴定书`, margin + 24, 152);
        ctx.fillStyle = '#a9a29a';
        ctx.font = '500 16px sans-serif';
        ctx.fillText('主题：退化成动物后，按本能缓慢活在人类世界。', margin + 24, 180);

        ctx.fillStyle = '#141414';
        ctx.fillRect(width - margin - 188, 92, 148, 44);
        ctx.strokeStyle = '#8b6b2c';
        ctx.strokeRect(width - margin - 188, 92, 148, 44);
        ctx.fillStyle = '#f4d67a';
        ctx.font = '600 14px monospace';
        ctx.fillText('INSTINCT MODE', width - margin - 166, 120);

        let currentY = 220;
        rows.forEach((row) => {
          row.cards.forEach((card, index) => {
            const x = margin + index * (cardWidth + gap);
            ctx.fillStyle = card.bg;
            ctx.fillRect(x, currentY, cardWidth, row.height);
            ctx.strokeStyle = card.border;
            ctx.strokeRect(x, currentY, cardWidth, row.height);

            ctx.fillStyle = card.accent;
            ctx.font = '600 14px monospace';
            ctx.fillText(card.label, x + 18, currentY + 28);

            ctx.fillStyle = card.text;
            ctx.font = card.font;
            card.lines.forEach((line, lineIndex) => {
              ctx.fillText(line, x + 18, currentY + 62 + lineIndex * card.lineHeight);
            });
          });

          currentY += row.height + gap;
        });

        ctx.fillStyle = '#101010';
        ctx.fillRect(margin, totalHeight - 84, innerWidth, 42);
        ctx.strokeStyle = '#262626';
        ctx.strokeRect(margin, totalHeight - 84, innerWidth, 42);
        ctx.fillStyle = '#a5a5a5';
        ctx.font = '500 14px monospace';
        ctx.fillText(`SUBJECT ROUTE: HUMAN -> ${animalName.toUpperCase()} -> INSTINCT`, margin + 18, totalHeight - 57);

        return canvas;
      };

      const isLocalHttpSession = () =>
        window.location.protocol.startsWith('http') &&
        ['localhost', '127.0.0.1'].includes(window.location.hostname);

      // --- 主应用组件 ---
      function App() {
        const [glitchActive, setGlitchActive] = useState(false);
        const fileInputRef = useRef(null);

        // 逆演化实验室状态
        const [uploadStatus, setUploadStatus] = useState('idle');
        const [uploadedImage, setUploadedImage] = useState(null);
        const [base64Data, setBase64Data] = useState(null);
        const [imageMimeType, setImageMimeType] = useState(null);

        const [selectedAnimal, setSelectedAnimal] = useState(null);
        const [processState, setProcessState] = useState('idle');
        const [generatedImage, setGeneratedImage] = useState(null);
        const [generatedReport, setGeneratedReport] = useState(null);
        const [errorMsg, setErrorMsg] = useState('');
        const [imageExportState, setImageExportState] = useState('idle');
        const [certificateExportState, setCertificateExportState] = useState('idle');
        const [imageDownloadUrl, setImageDownloadUrl] = useState('');
        const [certificateDownloadUrl, setCertificateDownloadUrl] = useState('');
        const [certificateDataUrl, setCertificateDataUrl] = useState('');
        const [activeModel, setActiveModel] = useState(PREFERRED_IMAGE_MODEL);
        const [showManifesto, setShowManifesto] = useState(false);
        const [manifestoVisibleCount, setManifestoVisibleCount] = useState(0);
        const [mobileSavePreview, setMobileSavePreview] = useState(null);

        // 编年史滚动状态
        const chronicleRef = useRef(null);
        const triggeredRef = useRef(false);
        const imageDownloadUrlRef = useRef('');
        const certificateDownloadUrlRef = useRef('');
        const [evoStage, setEvoStage] = useState(0); // 0-5

        const animalDatabase = [
          { id: 'cat', icon: '🐱', name: '猫' },
          { id: 'dog', icon: '🐶', name: '狗' },
          { id: 'hamster', icon: '🐹', name: '仓鼠' },
          { id: 'cockroach', icon: '🪳', name: '蟑螂' },
          { id: 'fly', icon: '🪰', name: '苍蝇' },
          { id: 'monkey', icon: '🐒', name: '猴子' },
          { id: 'gorilla', icon: '🦍', name: '猩猩' },
          { id: 'rabbit', icon: '🐰', name: '兔子' },
          { id: 'fox', icon: '🦊', name: '狐狸' },
          { id: 'wolf', icon: '🐺', name: '狼' },
          { id: 'tiger', icon: '🐯', name: '老虎' },
          { id: 'lion', icon: '🦁', name: '狮子' },
          { id: 'panda', icon: '🐼', name: '熊猫' },
          { id: 'capybara', icon: '🦦', name: '水豚' },
          { id: 'crow', icon: '🐦‍⬛', name: '乌鸦' },
          { id: 'parrot', icon: '🦜', name: '鹦鹉' },
          { id: 'duck', icon: '🦆', name: '鸭子' },
          { id: 'frog', icon: '🐸', name: '青蛙' },
          { id: 'snake', icon: '🐍', name: '蛇' },
          { id: 'lizard', icon: '🦎', name: '蜥蜴' },
          { id: 'octopus', icon: '🐙', name: '章鱼' },
          { id: 'shark', icon: '🦈', name: '鲨鱼' },
          { id: 'cow', icon: '🐮', name: '奶牛' },
          { id: 'pig', icon: '🐷', name: '猪' },
          { id: 'sheep', icon: '🐑', name: '羊' },
        ];

        const revokeDownloadUrl = (url) => {
          if (url && url.startsWith('blob:')) {
            URL.revokeObjectURL(url);
          }
        };

        const clearImageDownload = () => {
          if (imageDownloadUrlRef.current) {
            revokeDownloadUrl(imageDownloadUrlRef.current);
            imageDownloadUrlRef.current = '';
          }
          setImageDownloadUrl('');
        };

        const prepareImageDownload = (imageSrc) => {
          const downloadUrl = dataUrlToDownloadUrl(imageSrc);
          if (imageDownloadUrlRef.current && imageDownloadUrlRef.current !== downloadUrl) {
            revokeDownloadUrl(imageDownloadUrlRef.current);
          }
          imageDownloadUrlRef.current = downloadUrl;
          setImageDownloadUrl(downloadUrl);
          setImageExportState('ready');
        };

        const clearCertificateDownload = () => {
          if (certificateDownloadUrlRef.current) {
            revokeDownloadUrl(certificateDownloadUrlRef.current);
            certificateDownloadUrlRef.current = '';
          }
          setCertificateDownloadUrl('');
          setCertificateDataUrl('');
        };

        const prepareCertificateDownload = (report, animalName) => {
          const canvas = buildCertificateCanvas({ report, animalName });
          const dataUrl = canvas.toDataURL('image/png');
          const downloadUrl = dataUrlToDownloadUrl(dataUrl);
          if (certificateDownloadUrlRef.current && certificateDownloadUrlRef.current !== downloadUrl) {
            revokeDownloadUrl(certificateDownloadUrlRef.current);
          }
          certificateDownloadUrlRef.current = downloadUrl;
          setCertificateDataUrl(dataUrl);
          setCertificateDownloadUrl(downloadUrl);
          setCertificateExportState('ready');
        };

        const handleImageSave = async () => {
          if (!selectedAnimal || !generatedImage || !imageDownloadUrl) return;
          try {
            await saveAsset({
              dataUrl: generatedImage,
              downloadUrl: imageDownloadUrl,
              filename: `degradation_evolution_${selectedAnimal.id}.png`,
              title: `${selectedAnimal.name}退化演化图`,
              onPreviewFallback: setMobileSavePreview,
            });
          } catch (error) {
            console.error(error);
            setImageExportState('error');
          }
        };

        const handleCertificateSave = async () => {
          if (!selectedAnimal || !certificateDataUrl || !certificateDownloadUrl) return;
          try {
            await saveAsset({
              dataUrl: certificateDataUrl,
              downloadUrl: certificateDownloadUrl,
              filename: `degradation_certificate_${selectedAnimal.id}.png`,
              title: `${selectedAnimal.name}退化鉴定书`,
              onPreviewFallback: setMobileSavePreview,
            });
          } catch (error) {
            console.error(error);
            setCertificateExportState('error');
          }
        };

        const handleFileChange = (e) => {
          const file = e.target.files[0];
          if (!file) return;
          if (!file.type.startsWith('image/')) {
            alert('请上传图片文件 (JPG/PNG/WEBP)');
            return;
          }
          const reader = new FileReader();
          reader.onloadend = () => {
            const result = reader.result;
            setUploadedImage(result);
            const base64 = result.split(',')[1];
            setBase64Data(base64);
            setImageMimeType(file.type);
            setUploadStatus('uploaded');
          };
          reader.readAsDataURL(file);
        };

        const triggerFileInput = () => fileInputRef.current?.click();

        const handleGenerate = async () => {
          if (!base64Data || !selectedAnimal) return;
          setProcessState('processing');
          setErrorMsg('');
          clearImageDownload();
          clearCertificateDownload();
          setImageExportState('idle');
          setCertificateExportState('idle');
          setActiveModel(PREFERRED_IMAGE_MODEL);
          setGeneratedImage(null);
          setGeneratedReport(null);
          const normalizedApiKey = DEFAULT_API_KEY.trim();

          if (!normalizedApiKey) {
            setErrorMsg('API Key 未配置。');
            setProcessState('error');
            return;
          }

          const prompt = `Y2K surreal digital collage, stroboscopic multi-exposure evolution trail. COMPOSITION: A single image containing 5 distinct, overlapping cutout layers of the subject, arranged diagonally from top-left (largest) to bottom-right (smallest). INPUT RULE: Extract and preserve only the main human subject from the uploaded photo. Remove, ignore, and do not recreate any messy or unrelated background elements from the source image, including furniture, room clutter, bystanders, text, decorations, objects, reflections, and environmental distractions. Keep only the person's overall figure, face, hair, clothing silhouette, and key wearable details from the subject. CONTINUITY RULE: All 5 stages must feel like one smooth continuous morph of the same subject, using the same camera angle, same body orientation, same center of gravity, same movement direction, and strongly related silhouette. The transformation must progress in small believable steps with no sudden jump between adjacent stages. Each stage should inherit visible traits from the previous stage before adding more ${selectedAnimal.name} anatomy. SEQUENCE: 1. Top-left: 0% animal, exact original human from input. 2. Overlapping below: around 25% animal, still mostly human, only subtle ${selectedAnimal.name} traits such as ears, eyes, fur/skin texture, tail hint, or slight limb reshaping. 3. Middle: around 50% animal, balanced hybrid with clear continuity from stage 2, body proportions only partially shifted. 4. Overlapping below: around 75% animal, nearly complete ${selectedAnimal.name}, but still visibly evolving out of stage 3 rather than abruptly switching species. 5. Bottom-right: 100% pure ${selectedAnimal.name} body only. MORPHING DETAILS: Keep neighboring stages close in anatomy and pose. Do not make stage 2 or stage 3 too animal too early. Do not make stage 4 suddenly collapse all human structure at once. Let the spine, head angle, limb direction, and body mass migrate gradually across the five layers. CRITICAL DETAILS: Stages 1-4 may preserve visual continuity from the original subject. Stage 5 must contain absolutely no human elements: no human face, no human hands, no human feet, no human posture, no clothing, no crown, no jewelry, no accessories, no humanoid anatomy. Stage 5 must be a realistic full-body ${selectedAnimal.name} in its natural anatomy and stance. Background: Replace the original scene with a clean dreamy pastel pink/purple cloudy sky. Retro 2000s Photoshop layering effect, high contrast.

Also return a compact JSON object in Chinese for a meme-style "退化鉴定书". Output only one JSON object in a text part with these exact string keys: degradationFocus, instinctProfile, habitat, memo. Theme: after devolving into ${selectedAnimal.name}, the subject now lives in the human world by instinct instead of productivity, apps, schedules, dashboards, notifications, meetings, and optimization. Emphasize de-tech life, sunlight, food, walking, sleeping, wandering, touching grass, low-energy survival, and escaping digital pressure. Make it relatable, funny, screenshot-friendly, and strongly memeable for Chinese social media. Tone: 一本正经胡说八道, playful, sharp, specific, and emotionally resonant. Each field should be 1-2 short Chinese sentences and feel like a quotable line someone would repost.`;

          const payload = {
            contents: [{
              role: 'user',
              parts: [
                { text: prompt },
                { inlineData: { mimeType: imageMimeType || 'image/jpeg', data: base64Data } },
              ],
            }],
            generationConfig: { responseModalities: ['IMAGE', 'TEXT'] },
          };

          try {
            let lastError = null;
            const useLocalProxy = isLocalHttpSession();

            if (useLocalProxy) {
              const proxyResponse = await fetch(LOCAL_PROXY_ENDPOINT, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  apiKey: normalizedApiKey,
                  payload,
                  modelCandidates: IMAGE_MODEL_CANDIDATES,
                }),
              });

              const proxyData = await proxyResponse.json().catch(() => ({}));
              if (!proxyResponse.ok) {
                throw new Error(proxyData?.error || `本地代理请求失败 (${proxyResponse.status})`);
              }

              if (proxyData?.imageData) {
                setActiveModel(proxyData.modelName || PREFERRED_IMAGE_MODEL);
                setGeneratedImage(`data:${proxyData.mimeType || 'image/png'};base64,${proxyData.imageData}`);
                setGeneratedReport(parseAiReport(proxyData.responseText) || createFallbackReport(selectedAnimal));
                setProcessState('complete');
                return;
              }

              throw new Error(proxyData?.error || '本地代理未返回图像数据。');
            }

            for (const modelName of IMAGE_MODEL_CANDIDATES) {
              const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${normalizedApiKey}`;
              let response = null;

              for (let i = 0; i < 3; i++) {
                response = await fetch(url, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify(payload),
                });
                if (response.ok) break;
                await new Promise((resolve) => setTimeout(resolve, 1000 * Math.pow(2, i)));
              }

              if (!response || !response.ok) {
                let errorDetail = '';
                try {
                  const errorJson = await response.json();
                  errorDetail = errorJson?.error?.message || '';
                } catch (_) {
                  errorDetail = '';
                }
                const detailText = errorDetail ? ` | ${errorDetail}` : '';
                lastError = new Error(`API Error: ${response?.status} - ${modelName} 请求失败${detailText}`);
                continue;
              }

              const data = await response.json();
              const blockReason = data?.promptFeedback?.blockReason;
              if (blockReason) {
                lastError = new Error(`${modelName} 请求被安全策略拦截：${blockReason}`);
                continue;
              }

              const imagePart = getFirstInlineImage(data);
              const resultBase64 = imagePart?.inlineData?.data;
              const resultMimeType = imagePart?.inlineData?.mimeType || 'image/png';
              const responseText = getResponseText(data);

              if (resultBase64) {
                setActiveModel(modelName);
                setGeneratedImage(`data:${resultMimeType};base64,${resultBase64}`);
                setGeneratedReport(parseAiReport(responseText) || createFallbackReport(selectedAnimal));
                setProcessState('complete');
                return;
              }

              const textHint = responseText ? ` 模型回复：${responseText}` : '';
              lastError = new Error(`${modelName} 未返回图像数据，已尝试下一个模型。${textHint}`);
            }

            throw lastError || new Error('所有模型都未返回图像数据。');
          } catch (err) {
            console.error(err);
            const localFileHint = window.location.protocol === 'file:'
              ? ' 当前页面是通过 file:// 直接打开的；请在此目录运行 python3 server.py，然后访问 http://127.0.0.1:8000。'
              : '';
            setErrorMsg(`${err.message}${localFileHint}`);
            setProcessState('error');
          }
        };

        const handleReset = () => {
          clearImageDownload();
          clearCertificateDownload();
          setMobileSavePreview(null);
          setUploadStatus('idle');
          setUploadedImage(null);
          setBase64Data(null);
          setSelectedAnimal(null);
          setProcessState('idle');
          setGeneratedImage(null);
          setGeneratedReport(null);
          setImageExportState('idle');
          setCertificateExportState('idle');
          setActiveModel(PREFERRED_IMAGE_MODEL);
          if (fileInputRef.current) fileInputRef.current.value = '';
        };

        const scrollToEvolutionLab = () => {
          document.getElementById('evolution-lab')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
        };

        useEffect(() => {
          if (processState !== 'complete' || !generatedImage) {
            clearImageDownload();
            setImageExportState('idle');
            return;
          }

          try {
            clearImageDownload();
            setImageExportState('building');
            prepareImageDownload(generatedImage);
          } catch (error) {
            console.error(error);
            clearImageDownload();
            setImageExportState('error');
          }
        }, [processState, generatedImage]);

        useEffect(() => {
          const report = selectedAnimal ? (generatedReport || createFallbackReport(selectedAnimal)) : null;
          if (processState !== 'complete' || !selectedAnimal || !report) {
            clearCertificateDownload();
            setCertificateExportState('idle');
            return;
          }

          try {
            clearCertificateDownload();
            setCertificateExportState('building');
            prepareCertificateDownload(report, selectedAnimal.name);
          } catch (error) {
            console.error(error);
            clearCertificateDownload();
            setCertificateExportState('error');
          }
        }, [processState, generatedReport, selectedAnimal]);

        useEffect(() => {
          return () => {
            if (imageDownloadUrlRef.current) {
              revokeDownloadUrl(imageDownloadUrlRef.current);
              imageDownloadUrlRef.current = '';
            }
            if (certificateDownloadUrlRef.current) {
              revokeDownloadUrl(certificateDownloadUrlRef.current);
              certificateDownloadUrlRef.current = '';
            }
          };
        }, []);

        // 全局故障震动特效
        useEffect(() => {
          if (showManifesto) {
            setGlitchActive(false);
            return;
          }

          let glitchTimeoutId = null;
          const glitchInterval = setInterval(() => {
            setGlitchActive(true);
            glitchTimeoutId = setTimeout(() => setGlitchActive(false), 200);
          }, 4500);

          return () => {
            clearInterval(glitchInterval);
            if (glitchTimeoutId) clearTimeout(glitchTimeoutId);
            setGlitchActive(false);
          };
        }, [showManifesto]);

        // 退化编年史滚动监听
        useEffect(() => {
          const observer = new IntersectionObserver(
            (entries) => {
              if (entries[0].isIntersecting && !triggeredRef.current) {
                triggeredRef.current = true;
                let current = 1;
                setEvoStage(current);
                const timer = setInterval(() => {
                  current += 1;
                  setEvoStage(current);
                  if (current >= 5) {
                    clearInterval(timer);
                  }
                }, 800);
              }
            },
            { threshold: 0.4 }
          );

          if (chronicleRef.current) {
            observer.observe(chronicleRef.current);
          }
          return () => observer.disconnect();
        }, []);

        useEffect(() => {
          if (!showManifesto) {
            setManifestoVisibleCount(0);
            return;
          }

          let current = 0;
          const timer = setInterval(() => {
            current += 1;
            setManifestoVisibleCount(current);
            if (current >= MANIFESTO_LINES.length) {
              clearInterval(timer);
            }
          }, 140);

          return () => {
            clearInterval(timer);
          };
        }, [showManifesto]);

        useEffect(() => {
          if (showManifesto || mobileSavePreview) {
            document.body.style.overflow = 'hidden';
            return () => {
              document.body.style.overflow = '';
            };
          }

          document.body.style.overflow = '';
          return () => {
            document.body.style.overflow = '';
          };
        }, [showManifesto, mobileSavePreview]);

        useEffect(() => {
          if (!showManifesto) return;

          const onKeyDown = (event) => {
            if (event.key === 'Escape') {
              setShowManifesto(false);
            }
          };

          window.addEventListener('keydown', onKeyDown);
          return () => window.removeEventListener('keydown', onKeyDown);
        }, [showManifesto]);

        return (
          <div
            className={`min-h-screen bg-[#050505] text-white overflow-x-hidden font-sans relative selection:bg-red-600 selection:text-white ${!showManifesto && glitchActive ? 'translate-x-1 translate-y-[-2px]' : ''}`}
            style={{
              paddingTop: 'env(safe-area-inset-top)',
              paddingRight: 'env(safe-area-inset-right)',
              paddingBottom: 'env(safe-area-inset-bottom)',
              paddingLeft: 'env(safe-area-inset-left)',
            }}
          >
            {/* 核心 CSS 动画与样式 */}
            <style dangerouslySetInnerHTML={{__html: `
              @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700;900&family=Orbitron:wght@500;900&family=ZCOOL+KuaiLe&display=swap');
              .font-holy { font-family: 'Noto Serif SC', serif; }
              .font-tech { font-family: 'Orbitron', sans-serif; }
              .font-meme { font-family: 'ZCOOL KuaiLe', cursive; }
              .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
              .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 0, 60, 0.5); border-radius: 999px; }
              .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.06); }
              .animate-spin-slow { animation: spin 8s linear infinite; }

              /* Glitch Effect */
              .glitch-text { position: relative; color: #ff003c; text-shadow: 0 0 10px rgba(255,0,60,0.8), 0 0 20px rgba(255,0,60,0.4); font-weight: 900; letter-spacing: -2px; }
              .glitch-text::before, .glitch-text::after { content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.8; }
              .glitch-text::before { color: #0ff; z-index: -1; animation: glitch-anim-1 2s infinite linear alternate-reverse; }
              .glitch-text::after { color: #ff003c; z-index: -2; animation: glitch-anim-2 3s infinite linear alternate-reverse; }
              @keyframes glitch-anim-1 { 0% { clip-path: inset(20% 0 80% 0); transform: translate(-4px, 1px); } 20% { clip-path: inset(60% 0 10% 0); transform: translate(4px, -1px); } 40% { clip-path: inset(40% 0 50% 0); transform: translate(-4px, 2px); } 60% { clip-path: inset(80% 0 5% 0); transform: translate(4px, -2px); } 80% { clip-path: inset(10% 0 70% 0); transform: translate(-4px, 1px); } 100% { clip-path: inset(30% 0 40% 0); transform: translate(4px, -1px); } }
              @keyframes glitch-anim-2 { 0% { clip-path: inset(10% 0 60% 0); transform: translate(4px, -1px); } 20% { clip-path: inset(30% 0 20% 0); transform: translate(-4px, 2px); } 40% { clip-path: inset(70% 0 10% 0); transform: translate(4px, 1px); } 60% { clip-path: inset(20% 0 50% 0); transform: translate(-4px, -2px); } 80% { clip-path: inset(50% 0 30% 0); transform: translate(4px, 1px); } 100% { clip-path: inset(5% 0 80% 0); transform: translate(-4px, -1px); } }

              /* Stage 5 Glitch Shake */
              .stage-5-glitch { animation: stage5-shake 0.1s infinite; filter: drop-shadow(0 0 15px #ff003c); }
              @keyframes stage5-shake { 0% { transform: translate(2px, 1px) rotate(0deg); } 10% { transform: translate(-1px, -2px) rotate(-1deg); } 20% { transform: translate(-3px, 0px) rotate(1deg); } 30% { transform: translate(0px, 2px) rotate(0deg); } 40% { transform: translate(1px, -1px) rotate(1deg); } 50% { transform: translate(-1px, 2px) rotate(-1deg); } 60% { transform: translate(-3px, 1px) rotate(0deg); } 70% { transform: translate(2px, 1px) rotate(-1deg); } 80% { transform: translate(-1px, -1px) rotate(1deg); } 90% { transform: translate(2px, 2px) rotate(0deg); } 100% { transform: translate(1px, -2px) rotate(-1deg); } }

              /* Holy Effect */
              .holy-text { transform-origin: left center; color: #fffde7; text-shadow: 0 0 10px rgba(255,215,0,0.8), 0 0 20px rgba(255,215,0,0.6), 0 0 40px rgba(255,215,0,0.4), 0 0 80px rgba(255,140,0,0.4), 0 0 120px rgba(255,140,0,0.2); animation: holy-pulse 2.5s infinite alternate ease-in-out; }
              @keyframes holy-pulse { 0% { text-shadow: 0 0 10px #fde047, 0 0 20px #eab308, 0 0 40px #ca8a04; transform: scale(1); } 100% { text-shadow: 0 0 20px #fef08a, 0 0 50px #f59e0b, 0 0 100px #b45309, 0 0 150px #78350f; transform: scale(1.06); } }

              /* Backgrounds */
              .scanlines { background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2)); background-size: 100% 4px; }
              .manifesto-line { opacity: 0; transform: translateY(18px); filter: blur(8px); }
              .manifesto-line-visible { opacity: 1; transform: translateY(0); filter: blur(0); transition: opacity 0.45s ease, transform 0.45s ease, filter 0.45s ease; }
              .manifesto-pulse { animation: manifesto-pulse 3.2s ease-in-out infinite alternate; }
              @keyframes manifesto-pulse { 0% { box-shadow: 0 0 20px rgba(255,0,60,0.18), 0 0 80px rgba(255,220,90,0.04); } 100% { box-shadow: 0 0 40px rgba(255,0,60,0.28), 0 0 120px rgba(255,220,90,0.08); } }
              .manifesto-flicker { animation: manifesto-flicker 6s linear infinite; }
              @keyframes manifesto-flicker { 0%, 100% { opacity: 0.16; } 4% { opacity: 0.24; } 5% { opacity: 0.12; } 6% { opacity: 0.2; } 43% { opacity: 0.14; } 44% { opacity: 0.24; } 45% { opacity: 0.1; } 46% { opacity: 0.18; } }
              .manifesto-panel { width: min(94vw, 860px); }
              .manifesto-title { font-size: clamp(1.75rem, 3vw + 0.7rem, 3.2rem); line-height: 1.08; }
              .manifesto-copy { width: fit-content; max-width: 100%; margin: 0 auto; text-align: center; }
              .manifesto-copy p { font-size: clamp(0.82rem, 0.45vw + 0.76rem, 1.18rem); line-height: 1.55; letter-spacing: 0.02em; white-space: nowrap; }
              .manifesto-copy .manifesto-gap { height: 0.55rem; }
              @media (min-width: 768px) {
                .manifesto-copy { width: fit-content; }
                .manifesto-copy .manifesto-gap { height: 0.75rem; }
              }
              @media (max-width: 767px) {
                .manifesto-copy p { white-space: normal; text-wrap: balance; }
                .holy-text { transform-origin: center; text-shadow: 0 0 12px rgba(255,215,0,0.75), 0 0 26px rgba(245,158,11,0.38); }
              }
              @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
              .animate-marquee { animation: marquee 20s linear infinite; }
            `}} />

                            <img src={uploadedImage} alt="Preview" className="w-full h-full object-cover opacity-80" />

                              <RefreshCcw className="w-6 h-6 text-white" />
                            </div>
                            <div className="absolute bottom-1 right-1 bg-green-500/80 px-1 rounded text-[8px] font-tech text-black font-bold">DNA LOADED</div>
                          </>
                        ) : (
                          <div className="flex flex-col items-center gap-2 text-zinc-500">
                            <Image className="w-8 h-8" />
                            <span className="text-xs font-bold tracking-widest">上传碳基自拍</span>
                          </div>
                        )}
                      </div>

                      <div className="flex-1 border border-zinc-800 bg-[#020202] p-4 flex flex-col justify-center gap-3 font-tech text-[10px] sm:text-xs text-zinc-400 tracking-[0.16em] sm:tracking-widest">
                        <div className="flex justify-between gap-3 border-b border-zinc-800 pb-2">
                          <span>BIOMETRIC INPUT:</span>
                          <span className={uploadStatus === 'uploaded' ? 'text-green-500 font-bold' : 'text-red-500'}>{uploadStatus === 'uploaded' ? 'VERIFIED' : 'MISSING'}</span>
                        </div>
                        <div className="flex justify-between gap-3 border-b border-zinc-800 pb-2">
                          <span>TARGET SPECIES:</span>
                          <span className={selectedAnimal ? 'text-yellow-400 font-bold' : 'text-zinc-600'}>{selectedAnimal ? selectedAnimal.name.toUpperCase() : 'AWAITING SELECTION'}</span>
                        </div>
                        <div className="flex justify-between gap-3">
                          <span>ENGINE:</span>
                          <span className="text-cyan-500">{activeModel.toUpperCase()}</span>
                        </div>
                      </div>
                    </div>

                    <div className="border border-zinc-800 bg-[#0a0a0a] p-4 rounded">
                      <div className="text-xs font-tech text-red-500 mb-3 flex items-center gap-2">
                        <ScanLine className="w-4 h-4" /> SELECT MUTATION VECTOR
                      </div>
                      <div className="flex flex-wrap gap-2 max-h-[180px] overflow-y-auto custom-scrollbar pr-2">
                        {animalDatabase.map((animal) => (
                          <button key={animal.id} onClick={() => setSelectedAnimal(animal)} className={`px-3 py-1.5 border text-sm rounded flex items-center gap-2 transition-colors ${selectedAnimal?.id === animal.id ? 'border-yellow-500 bg-yellow-500/20 text-yellow-400 font-bold shadow-[0_0_10px_rgba(234,179,8,0.2)]' : 'border-zinc-700 bg-zinc-900/50 text-zinc-400 hover:border-zinc-500 hover:bg-zinc-800 hover:text-white'}`}>
                            <span className="text-lg leading-none">{animal.icon}</span>
                            {animal.name}
                          </button>
                        ))}
                      </div>
                    </div>

                    <div className="flex justify-end">
                      <button onClick={handleGenerate} disabled={uploadStatus !== 'uploaded' || !selectedAnimal} className={`w-full sm:w-auto px-8 py-3 font-bold tracking-widest uppercase transition-all flex items-center justify-center gap-2 ${uploadStatus === 'uploaded' && selectedAnimal ? 'bg-[#ff003c] text-white hover:bg-red-500 shadow-[0_0_20px_rgba(255,0,60,0.5)] cursor-pointer hover:scale-105' : 'bg-zinc-800 text-zinc-600 cursor-not-allowed border border-zinc-700'}`}>
                        <Zap className="w-5 h-5" /> 启动碳基逆演化
                      </button>
                    </div>
                  </div>
                )}

                {processState === 'processing' && (
                  <div className="w-full py-16 sm:py-24 flex flex-col items-center justify-center relative overflow-hidden bg-[#020202]">
                    <div className="absolute inset-0 scanlines opacity-40"></div>
                    <div className="absolute top-1/2 left-0 w-full h-1 bg-red-500 shadow-[0_0_20px_#ff003c] animate-[pulse_0.5s_infinite] -translate-y-1/2"></div>
                    <Loader2 className="w-12 h-12 text-red-500 animate-spin mb-4 relative z-10 drop-shadow-[0_0_10px_#ff003c]" />
                    <h3 className="text-lg sm:text-xl font-black tracking-[0.2em] sm:tracking-[0.4em] text-white glitch-text relative z-10 text-center px-4" data-text="AI引擎重写中">AI引擎重写中</h3>
                    <p className="text-red-400 font-tech text-[10px] sm:text-xs tracking-[0.16em] sm:tracking-widest mt-2 opacity-80 relative z-10 text-center px-4">INJECTING {selectedAnimal.name.toUpperCase()} DNA VIA CORE ENGINE...</p>
                  </div>
                )}

                {processState === 'complete' && generatedImage && (
                  <div className="w-full flex flex-col animate-in fade-in zoom-in duration-500">
                    <div className="bg-black p-3 border-b border-zinc-800 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2">
                      <div className="flex items-center gap-2 text-red-500 font-tech text-[10px] sm:text-xs">
                        <span className="w-2 h-2 bg-red-500 rounded-full animate-pulse"></span>
                        EVOLUTION_TRAJECTORY_RENDERED
                      </div>
                      <button onClick={handleReset} className="text-zinc-500 hover:text-white flex items-center gap-2 text-xs transition-colors">
                        <RefreshCcw className="w-3 h-3" /> 重新重组
                      </button>
                    </div>

                    <div className="relative border-x border-b border-zinc-800 bg-[#070707] p-4 md:p-5">
                      <div className="absolute inset-0 scanlines opacity-15 pointer-events-none"></div>
                      <div className="relative border border-amber-700/40 bg-[linear-gradient(180deg,rgba(24,19,14,0.9),rgba(8,8,8,0.98))] shadow-[inset_0_0_0_1px_rgba(255,220,150,0.05)]">
                        <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3 sm:gap-4 border-b border-amber-800/40 px-4 py-3 md:px-5">
                          <div>
                            <div className="font-tech text-[10px] tracking-[0.3em] text-amber-500/75">CARBON DEGRADATION ARCHIVE</div>
                            <div className="mt-1 text-sm md:text-base font-black tracking-[0.18em] text-[#f4dfb2]">碳基生物退化档案</div>
                          </div>
                          <div className="border border-red-500/40 px-2 py-1 text-[10px] font-tech tracking-[0.24em] text-red-400 self-start sm:self-auto">
                            FILE ACTIVE
                          </div>
                        </div>

                        <div className="p-3 md:p-5">
                          <div className="relative overflow-hidden border border-amber-800/35 bg-black">
                            <div className="absolute inset-0 border-[6px] border-black/35 z-20 pointer-events-none"></div>
                            <div className="absolute inset-0 pointer-events-none z-10 bg-[linear-gradient(135deg,rgba(245,208,120,0.08),transparent_28%,transparent_72%,rgba(255,0,60,0.08))]"></div>
                            <div className="absolute inset-0 pointer-events-none z-10 bg-[repeating-linear-gradient(90deg,rgba(255,255,255,0.03),rgba(255,255,255,0.03)_1px,transparent_1px,transparent_18px)] opacity-40"></div>

                            <img src={generatedImage} alt="Evolution Trajectory" className="w-full h-auto max-h-[440px] sm:max-h-[620px] object-contain relative z-0" />

                            <div className="absolute top-2 left-2 sm:top-3 sm:left-3 z-30 max-w-[calc(100%-1rem)] sm:max-w-none font-tech text-[9px] sm:text-[10px] text-white/70 tracking-[0.16em] sm:tracking-widest flex flex-col bg-black/60 p-1.5 sm:p-2 backdrop-blur-sm border border-white/10">
                              <span className="text-amber-300 font-bold mb-1">ARCHIVE: OVERLAP_MORPH</span>
                              <span>SUBJECT: HUMAN_001</span>
                              <span>DESTINATION: {selectedAnimal.name}</span>
                              <span>ENGINE: {activeModel.toUpperCase()}</span>
                            </div>

                            <div className="hidden sm:block absolute bottom-3 right-3 z-30 border border-red-500/45 bg-black/55 px-2 py-1 text-[10px] font-tech tracking-[0.22em] text-red-400">
                              DEGRADED SPECIMEN
                            </div>
                          </div>

                          {generatedReport && (
                            <div className="mt-4 border border-amber-800/35 bg-[#0b0b0b] p-3 md:p-4 relative overflow-hidden">
                              <div className="absolute inset-0 scanlines opacity-15 pointer-events-none"></div>
                              <div className="relative">
                                <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3 border-b border-amber-900/40 pb-2.5 mb-3">
                                  <div>
                                    <div className="font-tech text-[10px] tracking-[0.28em] text-amber-500/80">CARBON DEGRADATION CERTIFICATE</div>
                                    <h3 className="mt-1.5 text-base md:text-lg font-black text-[#f3e0b5] tracking-[0.08em]">{selectedAnimal.name}系退化鉴定书</h3>
                                  </div>
                                  <div className="shrink-0 border border-amber-400/40 px-2 py-1 text-[10px] font-tech tracking-[0.24em] text-amber-300 self-start sm:self-auto">APPROVED</div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                  <div className="border border-yellow-900/35 bg-[linear-gradient(180deg,rgba(54,36,14,0.26),rgba(14,12,10,0.9))] p-3 min-h-[126px]">
                                    <div className="font-tech text-[10px] tracking-[0.24em] text-yellow-500/80 mb-1">退化重点</div>
                                    <div className="text-yellow-200 text-sm md:text-base font-black leading-6 md:leading-7">{generatedReport.degradationFocus}</div>
                                  </div>
                                  <div className="border border-zinc-800 bg-zinc-950/70 p-3 min-h-[126px]">
                                    <div className="font-tech text-[10px] tracking-[0.24em] text-zinc-500 mb-1">本能属性</div>
                                    <div className="text-zinc-200 text-[13px] md:text-sm leading-6">{generatedReport.instinctProfile}</div>
                                  </div>
                                  <div className="border border-zinc-800 bg-zinc-950/70 p-3 min-h-[126px]">
                                    <div className="font-tech text-[10px] tracking-[0.24em] text-zinc-500 mb-1">最佳栖息地</div>
                                    <div className="text-zinc-200 text-[13px] md:text-sm leading-6">{generatedReport.habitat}</div>
                                  </div>
                                  <div className="border border-red-900/35 bg-red-950/10 p-3 min-h-[126px]">
                                    <div className="font-tech text-[10px] tracking-[0.24em] text-red-400/80 mb-1">档案备注</div>
                                    <div className="text-red-200 text-[13px] md:text-sm leading-6">{generatedReport.memo}</div>
                                  </div>
                                </div>
                              </div>
                            </div>
                          )}
                        </div>
                      </div>
                    </div>

                    <div className="bg-zinc-900 p-4 flex flex-col items-stretch sm:flex-row sm:items-center justify-between gap-4">
                      <div className="text-zinc-400 text-xs sm:text-sm flex-1"><span className="text-yellow-500 font-bold">逆演化完成。</span></div>
                      <div className="flex flex-col sm:flex-row gap-3 shrink-0 w-full sm:w-auto">
                        <div className="flex flex-col items-stretch sm:items-end gap-2 w-full sm:w-auto">
                          {imageExportState === 'ready' && imageDownloadUrl ? (
                            <button onClick={handleImageSave} className="w-full sm:w-auto px-6 py-3 sm:py-2 text-sm font-bold tracking-[0.16em] sm:tracking-widest uppercase transition-colors flex items-center justify-center gap-2 bg-white text-black hover:bg-yellow-400">
                              <Download className="w-4 h-4" />
                              保存退化演化图
                            </button>
                          ) : (
                            <button disabled className={`w-full sm:w-auto px-6 py-3 sm:py-2 text-sm font-bold tracking-[0.16em] sm:tracking-widest uppercase transition-colors flex items-center justify-center gap-2 ${imageExportState === 'building' ? 'bg-zinc-700 text-zinc-300 cursor-wait' : 'bg-zinc-800 text-zinc-500 cursor-not-allowed'}`}>
                              <Download className="w-4 h-4" />
                              {imageExportState === 'error' ? '演化图准备失败' : '演化图准备中...'}
                            </button>
                          )}
                          <div className="text-[11px] font-tech tracking-[0.12em] sm:tracking-[0.16em] min-h-[16px] text-center sm:text-right">
                            {imageExportState === 'ready' && <span className="text-green-400">EVOLUTION IMAGE READY</span>}
                            {imageExportState === 'building' && <span className="text-yellow-400">IMAGE PREPARING</span>}
                            {imageExportState === 'error' && <span className="text-red-400">IMAGE EXPORT FAILED</span>}
                            {imageExportState === 'idle' && <span className="text-zinc-500">PNG / GEMINI IMAGE</span>}
                          </div>
                        </div>

                        <div className="flex flex-col items-stretch sm:items-end gap-2 w-full sm:w-auto">
                          {certificateExportState === 'ready' && certificateDownloadUrl ? (
                            <button onClick={handleCertificateSave} className="w-full sm:w-auto px-6 py-3 sm:py-2 text-sm font-bold tracking-[0.16em] sm:tracking-widest uppercase transition-colors flex items-center justify-center gap-2 border border-amber-500/60 text-amber-200 bg-amber-500/10 hover:bg-amber-500/20">
                              <Download className="w-4 h-4" />
                              保存退化鉴定书
                            </button>
                          ) : (
                            <button disabled className={`w-full sm:w-auto px-6 py-3 sm:py-2 text-sm font-bold tracking-[0.16em] sm:tracking-widest uppercase transition-colors flex items-center justify-center gap-2 ${certificateExportState === 'building' ? 'bg-zinc-700 text-zinc-300 cursor-wait' : 'bg-zinc-800 text-zinc-500 cursor-not-allowed'}`}>
                              <Download className="w-4 h-4" />
                              {certificateExportState === 'error' ? '鉴定书准备失败' : '鉴定书准备中...'}
                            </button>
                          )}
                          <div className="text-[11px] font-tech tracking-[0.12em] sm:tracking-[0.16em] min-h-[16px] text-center sm:text-right">
                            {certificateExportState === 'ready' && <span className="text-amber-300">CERTIFICATE READY</span>}
                            {certificateExportState === 'building' && <span className="text-yellow-400">CERTIFICATE PREPARING</span>}
                            {certificateExportState === 'error' && <span className="text-red-400">CERTIFICATE EXPORT FAILED</span>}
                            {certificateExportState === 'idle' && <span className="text-zinc-500">PNG / CERTIFICATE</span>}
                          </div>
                        </div>
                      </div>
                      <div className="sm:hidden text-[11px] leading-5 text-zinc-500 text-center">
                        手机端点击保存会优先唤起系统分享；如果浏览器不支持，会打开可长按保存的预览。
                      </div>
                    </div>
                  </div>
                )}
              </div>
            </section>

            {/* --- 底部修饰边框与跑马灯 --- */}
            <footer className="hidden md:block fixed bottom-0 left-0 w-full overflow-hidden bg-yellow-400 text-black font-black py-2 border-t-4 border-black z-50 transform -skew-y-1 translate-y-2 pointer-events-none">
              <div className="flex whitespace-nowrap animate-marquee items-center gap-8 text-sm md:text-base">
                {Array(8).fill('').map((_, i) => (
                  <React.Fragment key={i}>
                    <span>⚠️ 警告：检测到过度思考，建议立刻躺平</span>
                    <span className="opacity-50">///</span>
                    <span>碳基生物最后的倔强：早睡早起</span>
                    <span className="opacity-50">///</span>
                    <span>AI正在学习你的摸鱼技巧</span>
                    <span className="opacity-50">///</span>
                  </React.Fragment>
                ))}
              </div>
            </footer>

            <div className="fixed top-4 left-4 w-16 h-16 border-t-2 border-l-2 border-red-900 z-10 opacity-50 pointer-events-none"></div>
            <div className="fixed top-4 right-4 w-16 h-16 border-t-2 border-r-2 border-red-900 z-10 opacity-50 pointer-events-none"></div>
            <div className="fixed bottom-16 left-4 w-16 h-16 border-b-2 border-l-2 border-red-900 z-10 opacity-50 pointer-events-none"></div>
            <div className="fixed bottom-16 right-4 w-16 h-16 border-b-2 border-r-2 border-red-900 z-10 opacity-50 pointer-events-none"></div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
